<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>디자인 QA 런처</title>
<style>
  :root { --bg:#010102; --card:#0f1011; --surface2:#141516; --line:#23252a; --txt:#f7f8f8; --sub:#8a8f98; --accent:#5e6ad2; --ok:#27a644; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Apple SD Gothic Neo",sans-serif;
         background:var(--bg); color:var(--txt); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  .card { width:min(560px,100%); background:var(--card); border:1px solid var(--line); border-radius:16px; padding:28px 26px; }
  h1 { margin:0 0 4px; font-size:20px; font-weight:600; letter-spacing:-0.4px; }
  h1 .h1-icon { font-style:normal; color:var(--sub); margin-right:6px; font-size:16px; vertical-align:middle; position:relative; top:-1px; }
  p.sub { margin:0 0 18px; color:var(--sub); font-size:13px; line-height:1.5; }
  hr.section-divider { border:none; border-top:1px solid var(--line); margin:0 0 20px; }
  label { display:block; font-size:13px; color:var(--sub); margin:16px 0 6px; }
  input { width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--line); background:var(--surface2); color:var(--txt); font-size:14px; }
  input:focus { outline:none; border-color:#5e69d1; }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  .btn-group { margin-top:22px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn { width:100%; padding:0; border-radius:10px; cursor:pointer; text-align:left; }
  .btn:disabled { opacity:.45; cursor:default; pointer-events:none; }
  .btn-inner { display:flex; flex-direction:column; gap:4px; padding:14px 15px; }
  .btn-label { font-size:14px; font-weight:700; line-height:1.2; }
  .btn-desc  { font-size:11.5px; line-height:1.3; opacity:.8; }
  .btn-visual { border:1.5px solid #c4c4cc; background:#ffffff; color:#111111; }
  .btn-visual:hover:not(:disabled) { background:#f2f2f4; border-color:#8a8f98; }
  .btn-full   { border:0; background:var(--accent); color:#ffffff; }
  .btn-full:hover:not(:disabled) { filter:brightness(1.12); }
  .status { margin-top:18px; font-size:13px; line-height:1.6; min-height:20px; }
  .status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); margin-right:7px; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  a.report { display:inline-block; margin-top:10px; color:var(--ok); font-weight:700; text-decoration:none; }
  .hint { color:#e0683a; }
  .meta { color:var(--sub); font-size:11px; margin-top:18px; line-height:1.6; }
  .compare-block { background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:12px; padding:14px 16px 16px; }
  .compare-block > label { margin-top:10px; }
  .compare-block .upload-zone { margin-top:12px; }
  .compare-block-label { font-size:11px; font-weight:500; letter-spacing:0.5px; color:var(--sub); opacity:.65; margin-bottom:0; }
  .upload-zone { border:1.5px dashed var(--line); border-radius:10px; padding:14px; cursor:pointer;
                 text-align:center; transition:border-color .15s; }
  .upload-zone:hover { border-color:#5e69d1; }
  .upload-zone.drag-over { border-color:#5e69d1; background:#0d0e10; }
  .upload-zone.has-file { border-color:#34343a; cursor:default; }
  .upload-placeholder { color:var(--sub); font-size:13px; pointer-events:none; }
  .upload-placeholder span:not(.upload-hint) { display:block; font-size:18px; margin-bottom:4px; }
  .upload-hint { display:block; font-size:11px; color:var(--sub); margin-top:5px; line-height:1.5; opacity:.75; }
  .upload-preview { display:none; align-items:center; gap:10px; text-align:left; }
  .upload-preview img { width:64px; height:48px; object-fit:cover; border-radius:6px; border:1px solid var(--line); flex-shrink:0; }
  .upload-preview-info { flex:1; min-width:0; }
  .upload-preview-name { font-size:12px; color:var(--txt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .upload-preview-size { font-size:11px; color:var(--sub); margin-top:2px; }
  .upload-clear { background:none; border:1px solid var(--line); color:var(--sub); border-radius:6px;
                  padding:3px 8px; cursor:pointer; font-size:12px; flex-shrink:0; }
  .upload-clear:hover { border-color:#5e69d1; color:var(--txt); }
  input.optional { border-color:#1e2026; }
  input.optional::placeholder { color:#3a3e48; }
  .dimmed { opacity:.3; pointer-events:none; transition:opacity .2s; }
  .upload-zone.dimmed { pointer-events:none; opacity:1; }
  .upload-zone.dimmed .upload-placeholder,
  .upload-zone.dimmed .upload-preview { opacity:0.3; }
  .input-wrap { position:relative; }
  .input-wrap input { padding-right:32px; }
  .input-clear { position:absolute; right:9px; top:50%; transform:translateY(-50%);
                 background:none; border:none; color:var(--sub); cursor:pointer;
                 font-size:13px; line-height:1; padding:3px 5px; display:none; border-radius:4px; }
  .input-clear:hover { color:var(--txt); background:var(--line); }
  .input-wrap.has-value .input-clear { display:block; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .card-header h1 { margin:0; }
  .loop-badge { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--sub); flex-shrink:0; background:var(--surface2); padding:4px 10px; border-radius:20px; border:none; }
  .loop-badge .dot-on  { width:8px; height:8px; border-radius:50%; background:var(--ok); flex-shrink:0; }
  .loop-badge .dot-off { width:8px; height:8px; border-radius:50%; background:#e0683a; flex-shrink:0; }
  .loop-badge code { font-family:ui-monospace,"SF Mono",Menlo,monospace; background:var(--card); padding:1px 5px; border-radius:4px;
                     color:var(--accent); cursor:pointer; user-select:all; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>디자인 QA</h1>
      <div class="loop-badge" id="loopBadge">
        <span class="dot-off" id="loopDot"></span>
        <span id="loopMsg">감시 루프 확인 중…</span>
      </div>
    </div>
    <p class="sub">Figma 프레임과 로컬 웹 화면을 비교해 리포트를 만들어요. URL 두 개를 넣고 버튼을 누르세요.</p>
    <hr class="section-divider">

    <label>Figma 프레임 URL</label>
    <div class="input-wrap">
      <input id="figmaUrl" placeholder="https://www.figma.com/design/..." />
      <button class="input-clear" id="clearFigmaUrl" tabindex="-1" aria-label="지우기">✕</button>
    </div>

    <label>비교할 웹 화면</label>
    <div class="compare-block">
      <label style="margin-top:0">웹 주소</label>
      <div class="input-wrap">
        <input id="webUrl" placeholder="브라우저 주소창의 URL을 붙여넣으세요" />
        <button class="input-clear" id="clearWebUrl" tabindex="-1" aria-label="지우기">✕</button>
      </div>

      <label style="margin-top:8px">스크린샷</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="webImage" accept="image/png,image/jpeg,image/webp" style="display:none">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 17.01 17.01"><path d="M4,1h6.95c.14,0,.28.06.37.16l3.05,3.37c.08.09.13.21.13.34v9.63c0,.83-.67,1.5-1.5,1.5H4c-.83,0-1.5-.67-1.5-1.5h0V2.5c0-.83.67-1.5,1.5-1.5Z" fill="none" stroke="currentColor"/><path d="M14.5,5h-3.5c-.28,0-.5-.22-.5-.5V1" fill="none" stroke="currentColor"/><path d="M8.5,5.5c.28,0,.5.22.5.5v2.5h2.5c.28,0,.5.22.5.5s-.22.5-.5.5h-2.5v2.5c0,.28-.22.5-.5.5s-.5-.22-.5-.5v-2.5h-2.5c-.28,0-.5-.22-.5-.5s.22-.5.5-.5h2.5v-2.5c0-.28.22-.5.5-.5Z" fill="currentColor" fill-rule="evenodd"/></svg></span>전체 페이지 스크린샷을 드래그하거나 클릭해 업로드하세요
          <span class="upload-hint">Chrome: F12 → 동일한 디바이스 해상도 설정 → ⋮ (더보기) → Capture full size screenshot</span>
        </div>
        <div class="upload-preview" id="uploadPreview">
          <img id="previewImg" alt="">
          <div class="upload-preview-info">
            <div class="upload-preview-name" id="previewName"></div>
            <div class="upload-preview-size" id="previewSize"></div>
          </div>
          <button class="upload-clear" id="uploadClear">제거</button>
        </div>
      </div>
    </div>

    <div class="row">
      <div><label>폭(width, 선택)</label><div class="input-wrap"><input id="width" placeholder="자동" inputmode="numeric" /><button class="input-clear" id="clearWidth" tabindex="-1" aria-label="지우기">✕</button></div></div>
      <div><label>scale(선택)</label><div class="input-wrap"><input id="scale" placeholder="1" inputmode="decimal" /><button class="input-clear" id="clearScale" tabindex="-1" aria-label="지우기">✕</button></div></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-visual" id="goVisual">
        <div class="btn-inner">
          <span class="btn-label">⚡ 빠른 시각 비교</span>
          <span class="btn-desc">시각 전체 분석만 · 약 5~7분</span>
        </div>
      </button>
      <button class="btn btn-full" id="goFull">
        <div class="btn-inner">
          <span class="btn-label">🔍 상세 QA 분석</span>
          <span class="btn-desc">수치 및 시각 전체 분석 · 약 8~12분</span>
        </div>
      </button>
    </div>
    <div class="status" id="status"></div>

    <div class="meta">
      Figma 읽기는 인증된 Claude 세션이 담당해요(헤드리스 OAuth 미인증).
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const LS = 'qa-launcher';

// 최근 입력 복원
try {
  const saved = JSON.parse(localStorage.getItem(LS) || '{}');
  for (const k of ['figmaUrl','webUrl','width','scale']) if (saved[k]) $(k).value = saved[k];
} catch {}

// 인풋 X 버튼
function bindClear(inputId, clearId, onClear) {
  const inp = $(inputId), btn = $(clearId);
  const wrap = inp.closest('.input-wrap');
  function sync() { wrap.classList.toggle('has-value', inp.value.length > 0); }
  inp.addEventListener('input', sync);
  btn.addEventListener('click', () => { inp.value = ''; sync(); if (onClear) onClear(); inp.focus(); });
  sync();
}
bindClear('figmaUrl', 'clearFigmaUrl');
bindClear('webUrl', 'clearWebUrl', updateDimState);
bindClear('width', 'clearWidth');
bindClear('scale', 'clearScale');

// 스크린샷 업로드 로직
let webImageBase64 = null;

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

const MAX_IMG_MB = 20;

function setUploadFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    $('status').innerHTML = `<span class="hint">이미지 파일(PNG·JPG·WebP)만 업로드할 수 있어요.</span>`;
    return;
  }
  if (file.size > MAX_IMG_MB * 1024 * 1024) {
    $('status').innerHTML = `<span class="hint">파일이 너무 커요 (최대 ${MAX_IMG_MB}MB). 이미지를 압축해 주세요.</span>`;
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    webImageBase64 = e.target.result;
    $('previewImg').src = webImageBase64;
    $('previewName').textContent = file.name;
    $('previewSize').textContent = formatBytes(file.size);
    $('uploadPlaceholder').style.display = 'none';
    $('uploadPreview').style.display = 'flex';
    $('uploadZone').classList.add('has-file');
    $('webUrl').classList.add('optional');
    $('webUrl').placeholder = '선택 (스크린샷 있으면 생략 가능)';
    updateDimState();
  };
  reader.readAsDataURL(file);
}

function clearUpload() {
  webImageBase64 = null;
  $('webImage').value = '';
  $('previewImg').src = '';
  $('previewName').textContent = '';
  $('previewSize').textContent = '';
  $('uploadPlaceholder').style.display = '';
  $('uploadPreview').style.display = 'none';
  $('uploadZone').classList.remove('has-file');
  $('webUrl').classList.remove('optional');
  $('webUrl').placeholder = '브라우저 주소창의 URL을 붙여넣으세요';
  updateDimState();
}

function updateDimState() {
  const hasImg = !!webImageBase64;
  const hasUrl = $('webUrl').value.trim().length > 0;
  // 스크린샷 있으면 URL 흐리게, URL 있으면 업로드 영역 흐리게
  $('webUrl').classList.toggle('dimmed', hasImg && !hasUrl);
  $('uploadZone').classList.toggle('dimmed', hasUrl && !hasImg);
}

$('webUrl').oninput = updateDimState;
$('uploadZone').onclick = e => { if (!$('uploadZone').classList.contains('has-file')) $('webImage').click(); };
updateDimState();
$('uploadClear').onclick = e => { e.stopPropagation(); clearUpload(); };
$('webImage').onchange = e => { if (e.target.files[0]) setUploadFile(e.target.files[0]); };
$('uploadZone').ondragover = e => { e.preventDefault(); $('uploadZone').classList.add('drag-over'); };
$('uploadZone').ondragleave = () => $('uploadZone').classList.remove('drag-over');
$('uploadZone').ondrop = e => {
  e.preventDefault();
  $('uploadZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setUploadFile(file);
};

// 감시 루프 상태 배지
async function checkLoop() {
  try {
    const r = await fetch('/loop-status');
    const d = await r.json();
    const dot = $('loopDot');
    const msg = $('loopMsg');
    // QA 진행 중에는 루프가 busy → 하트비트가 늦어도 꺼짐으로 표시하지 않음
    if (d.active || polling) {
      dot.className = 'dot-on';
      if (polling) {
        msg.innerHTML = `감시 루프 활성 — QA 분석 진행 중`;
      } else {
        msg.innerHTML = `감시 루프 활성 <span style="color:var(--sub)">(${d.ageSec}초 전 응답)</span>`;
      }
    } else {
      dot.className = 'dot-off';
      msg.innerHTML = `감시 루프 꺼짐 — Claude 세션에서 <code onclick="navigator.clipboard.writeText('/loop 30s /qa-watch')">/loop 30s /qa-watch</code> 를 실행하세요`;
    }
  } catch {}
}
checkLoop();
setInterval(checkLoop, 5000);

let polling = null;
let pollStartTime = null;
const POLL_TIMEOUT_MS = 10 * 60 * 1000; // 10분

function elapsed() {
  if (!pollStartTime) return '';
  const sec = Math.round((Date.now() - pollStartTime) / 1000);
  if (sec < 60) return `${sec}초 경과`;
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}분 ${s}초 경과`;
}

async function poll(id) {
  try {
    const r = await fetch(`/result?id=${encodeURIComponent(id)}`);
    const d = await r.json();
    const res = d.result;
    if (res && res.status === 'done') {
      stop();
      const path = res.report || 'reports/qa-report.html';
      $('status').innerHTML = `<span style="color:var(--ok)">✓ 완료</span> · 리포트가 준비됐어요.
        <br><a class="report" href="/${path}" target="_blank">리포트 열기 →</a>`;
      return;
    }
    if (res && res.status === 'error') {
      stop();
      $('status').innerHTML = `<span class="hint">⚠ 오류:</span> ${res.message || '알 수 없는 오류'}`;
      return;
    }
    // 타임아웃
    if (pollStartTime && Date.now() - pollStartTime > POLL_TIMEOUT_MS) {
      stop();
      $('status').innerHTML = `<span class="hint">10분이 지나도 완료되지 않았어요. Claude 세션이 닫혀 있거나 오류가 생긴 것 같아요. 다시 시도해 주세요.</span>`;
      return;
    }
    // 아직 진행 중
    let msg = '';
    if (d.requestStatus === 'pending') {
      msg = `<span class="dot"></span>대기 중… Claude가 곧 감지해요. <span style="color:var(--sub)">(${elapsed()})</span>`;
      if (d.requestAgeSec != null && d.requestAgeSec > 75) {
        msg += `<br><span class="hint">감시 루프가 반응이 없어요. Claude 세션에서 감시가 켜져 있는지 확인하세요.</span>`;
      }
    } else {
      // running
      msg = `<span class="dot"></span>Figma 읽기 → 웹 캡처 → 분석 중… <span style="color:var(--sub)">(${elapsed()})</span>
        <br><span style="color:var(--sub);font-size:12px">Claude 창에 말 걸지 않으면 더 빨리 끝나요.</span>`;
    }
    $('status').innerHTML = msg;
  } catch (e) {
    $('status').innerHTML = `<span class="hint">서버 연결 끊김:</span> ${e.message}`;
  }
}

function setButtonsDisabled(disabled) {
  $('goVisual').disabled = disabled;
  $('goFull').disabled = disabled;
}

function stop() {
  if (polling) { clearInterval(polling); polling = null; }
  setButtonsDisabled(false);
}

async function runQA(mode) {
  stop(); // 이전 polling 정리
  const figmaUrl = $('figmaUrl').value.trim();
  const webUrl = $('webUrl').value.trim();
  // 루프 꺼짐 상태에서 경고 (UX: 어차피 처리 못함)
  try {
    const ls = await fetch('/loop-status');
    const ld = await ls.json();
    if (!ld.active) {
      $('status').innerHTML = `<span class="hint">감시 루프가 꺼져 있어요. Claude 세션에서 <code>/loop 30s /qa-watch</code>를 먼저 실행하세요.</span>`;
      return;
    }
  } catch {}
  if (!/^https?:\/\//.test(figmaUrl)) {
    $('status').innerHTML = `<span class="hint">Figma URL을 http(s)로 정확히 넣어주세요.</span>`;
    return;
  }
  if (!webImageBase64 && !/^https?:\/\//.test(webUrl)) {
    $('status').innerHTML = `<span class="hint">웹 URL을 입력하거나 스크린샷을 업로드해 주세요.</span>`;
    return;
  }
  const payload = { figmaUrl, webUrl, width: $('width').value.trim(), scale: $('scale').value.trim(), mode };
  if (webImageBase64) payload.webImageBase64 = webImageBase64;
  localStorage.setItem(LS, JSON.stringify({ figmaUrl, webUrl, width: payload.width, scale: payload.scale }));
  setButtonsDisabled(true);
  const modeLabel = mode === 'visual' ? '⚡ 빠른 시각 비교' : '🔍 상세 QA 분석';
  $('status').innerHTML = `<span class="dot"></span>일감 전송 중…`;
  try {
    const r = await fetch('/run', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '요청 실패');
    pollStartTime = Date.now();
    $('status').innerHTML = `<span class="dot"></span>${modeLabel} 시작됨 — 세션 감시 루프가 곧 집어갈 거예요.`;
    polling = setInterval(() => poll(d.id), 2000);
    poll(d.id);
  } catch (e) {
    stop();
    $('status').innerHTML = `<span class="hint">전송 실패:</span> ${e.message}`;
  }
}

$('goVisual').onclick = () => runQA('visual');
$('goFull').onclick   = () => runQA('full');
</script>
</body>
</html>
